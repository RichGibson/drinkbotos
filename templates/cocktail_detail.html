{% extends  "base.html" %}

{% block title %}{{ cocktail_name }} | Cocktail Robot{% endblock %}

{% block content %}
<style>
  #main-layout {
    display: flex;
    align-items: flex-start;
    gap: 8rem;
  }

  #glass-wrapper {
    position: relative;
    width: 231px;
    height: 324px;
    margin-top: 1.4rem;
  }

  #glass {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    -webkit-mask-image: url('/static/images/coupe_glass_bowl_mask.svg');
    -webkit-mask-size: 100% 100%;
    -webkit-mask-repeat: no-repeat;
    mask-image: url('/static/images/coupe_glass_bowl_mask.svg');
    mask-size: 100% 100%;
    mask-repeat: no-repeat;
  }

  .ingredient-slider {
    margin-bottom: 0.6rem;
  }

  .layer {
    position: absolute;
    left: 0;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    color: #fff;
    text-shadow: 0 0 3px rgba(0,0,0,0.6);
    overflow: hidden;
    box-sizing: border-box;
  }

  #glass-overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }
</style>

<h3 style="margin-top: 0; margin-bottom: 0.75rem;">Customize your {{ cocktail_name }}</h3>

<div class="controls">
  <label for="drink-size">Drink Size:</label>
  <select id="drink-size" onchange="updateStack()">
    <option value="taster">Taster (1 oz)</option>
    <option value="0.5">½ Drink</option>
    <option value="1.0" selected>Normal</option>
    <option value="2.0">Double</option>
  </select>

  <label style="margin-left: 1rem;">
    <input type="checkbox" id="keep-total-volume" onchange="updateStack()">
    Keep total volume constant
  </label>
</div>

<div id="main-layout">
  <div id="sliders"></div>
  <div id="output">
    <div id="glass-wrapper">
      <div id="glass" class="glass"></div>
      <img src="{{ url_for('static', filename='images/coupe_glass.svg') }}" id="glass-overlay" alt="">
    </div>
    <div id="total-volume">Total Volume: 0 oz | Estimated ABV: 0%</div>
    <div id="recipe" class="recipe">
      <h2>Adjusted Recipe</h2>
      <table>
        <thead><tr><th>Ingredient</th><th>Adjusted</th><th>Original</th><th>Unit</th></tr></thead>
        <tbody id="recipe-body"></tbody>
      </table>
    </div>
    <button id="make-cocktail">Make This Cocktail</button>
  </div>
</div>

<!-- div id="ruler"></div -->

<pre id="debug-output">{{ ingredients_json }}</pre>

<script>
const ingredients = {{ ingredients_json | safe }};
console.log('Loaded ingredients:', ingredients);
</script>


<script>
document.addEventListener('DOMContentLoaded', () => {
  const makeBtn = document.getElementById('make-cocktail');
  if (makeBtn) {
    makeBtn.addEventListener('click', () => {
      alert('🍹 Your cocktail is being mixed!');
      console.log('Drink mixing triggered!');
    });
  }

  const drinkSize = document.getElementById('drink-size');
  const keepVolume = document.getElementById('keep-total-volume');
  if (drinkSize) {
    drinkSize.addEventListener('change', updateStack);
  }
  let lockedTotal = null;
  if (keepVolume) {
    keepVolume.addEventListener('change', () => {
      if (keepVolume.checked) {
        lockedTotal = uniqueIngredients.reduce((sum, ing) => sum + parseFloat(sliderMap[ing.name].value), 0);
      }
      updateStack();
    });
  }

  const seen = new Set();
  const uniqueIngredients = [];
  const sliderMap = {};

  ingredients.forEach((ing, i) => {
    if (!seen.has(ing.name)) {
      ing._sliderId = i;
      uniqueIngredients.push(ing);
      seen.add(ing.name);
    }
  });

  const sliderBank = document.createElement('div');
  sliderBank.style.display = 'none';
  document.body.appendChild(sliderBank);

  uniqueIngredients.forEach((ing) => {
    const slider = document.createElement('input');
    slider.type = 'range';
    slider.min = 0;
    slider.max = 5;
    slider.step = 0.1;
    slider.value = ing.base;
    slider.dataset.name = ing.name;
    slider.addEventListener('input', (e) => {
      ingredients.forEach(i => { if (i.name === e.target.dataset.name) i.changed = true; else i.changed = false; });
      updateStack();
    });
    sliderBank.appendChild(slider);
    sliderMap[ing.name] = slider;
  });

  const types = Array.from(new Set(ingredients.flatMap(i => i.type))).sort();
console.log('Extracted types:', types);
  const container = document.getElementById('sliders');
  const glass = document.getElementById('glass');
  const recipeBody = document.getElementById('recipe-body');
  const totalVol = document.getElementById('total-volume');

  types.forEach(type => {
    const section = document.createElement('div');
    section.innerHTML = `<h3>${type}</h3>`;

    uniqueIngredients.filter(i => i.type.includes(type)).forEach(ing => {
      const label = document.createElement('label');
      label.innerText = `${ing.name} (${ing.unit})`;
      label.dataset.name = ing.name;

      const realSlider = sliderMap[ing.name];
      const clone = realSlider.cloneNode();
      clone.value = realSlider.value;
      clone.dataset.name = realSlider.dataset.name;
      clone.addEventListener('input', (e) => {
        ingredients.forEach(i => { if (i.name === e.target.dataset.name) i.changed = true; else i.changed = false; });
        realSlider.value = e.target.value;
        updateStack();
      });

      const wrapper = document.createElement('div');
      wrapper.className = 'ingredient-slider';
      wrapper.appendChild(label);
      wrapper.appendChild(clone);
      section.appendChild(wrapper);
    });

    container.appendChild(section);
  });

  function updateStack() {
    glass.innerHTML = '';
    recipeBody.innerHTML = '';
    let total = 0;
    let active = [];

    uniqueIngredients.forEach(ing => {
      const val = parseFloat(sliderMap[ing.name].value);
      if (val > 0) {
        active.push({ ...ing, value: val });
        total += val;
      }
    });

    const keepTotal = document.getElementById('keep-total-volume').checked;
    const drinkSizeVal = document.getElementById('drink-size').value;
    const sizeMultiplier = drinkSizeVal === 'taster' ? (total > 0 ? 1 / total : 1) : parseFloat(drinkSizeVal);

    if (keepTotal && lockedTotal !== null && active.length > 1) {
      const changed = active.find(i => i.changed);
      if (changed) {
        const rest = active.filter(i => i !== changed);
        const restTarget = lockedTotal - changed.value;
        const restCurrent = rest.reduce((sum, i) => sum + i.value, 0);
        const scale = restCurrent > 0 ? restTarget / restCurrent : 0;

        rest.forEach(i => {
          const newVal = Math.max(0, i.value * scale);
          // Update master slider and all visible clones
          document.querySelectorAll(`input[type=range][data-name="${i.name}"]`).forEach(s => s.value = newVal);
          i.value = newVal;
        });

        total = lockedTotal;
      }
    }

    const unscaledTotal = total;
    total *= sizeMultiplier;

    let totalAlcohol = active.reduce((sum, ing) => {
      return sum + (ing.abv ? ing.value * (ing.abv / 100) : 0);
    }, 0);

    totalVol.textContent = `Total Volume: ${total.toFixed(1)} oz | Estimated ABV: ${(unscaledTotal > 0 ? (totalAlcohol / unscaledTotal * 100).toFixed(1) : 0)}%`;

    // Reset all labels to default color
    document.querySelectorAll('label[data-name]').forEach(el => {
      el.style.color = '';
    });

    // Bowl occupies the top 31% of the SVG; layers must fill from bowl bottom upward
    const bowlFraction = 0.31;
    const bowlHeight = glass.offsetHeight * bowlFraction;
    const bowlBottomOffset = glass.offsetHeight * (1 - bowlFraction);
    const fillHeight = Math.min(bowlHeight, bowlHeight * sizeMultiplier);

    let bottomOffset = bowlBottomOffset;
    active.forEach((ing, i) => {
      const layer = document.createElement('div');
      layer.className = 'layer';
      const height = (ing.value / unscaledTotal) * fillHeight;
      layer.style.height = height + 'px';
      layer.style.bottom = bottomOffset + 'px';
      layer.style.background = getColor(i);
      layer.innerText = ing.name;
      glass.appendChild(layer);
      bottomOffset += height;

      // Color all matching labels (ingredient may appear in multiple sections)
      document.querySelectorAll(`label[data-name="${ing.name}"]`).forEach(lbl => {
        lbl.style.color = getLabelColor(i);
      });

      const row = document.createElement('tr');
      row.innerHTML = `<td>${ing.name}</td><td>${(ing.value * sizeMultiplier).toFixed(1)}</td><td>${(ing.base * sizeMultiplier).toFixed(1)}</td><td>${ing.unit}</td>`;
      recipeBody.appendChild(row);
    });

    // Concave meniscus on the topmost layer
    if (active.length > 0) {
      const topLayer = glass.lastElementChild;
      const meniscusSvg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      meniscusSvg.setAttribute('viewBox', '0 0 100 16');
      meniscusSvg.setAttribute('preserveAspectRatio', 'none');
      meniscusSvg.style.cssText = 'position:absolute; bottom:100%; left:0; width:100%; height:16px;';
      const meniscusPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      // Concave surface: high at edges, dips down in the center
      meniscusPath.setAttribute('d', 'M 0,0 C 35,0 35,16 50,16 C 65,16 65,0 100,0 L 100,16 L 0,16 Z');
      meniscusPath.setAttribute('fill', getColor(active.length - 1));
      meniscusSvg.appendChild(meniscusPath);
      topLayer.appendChild(meniscusSvg);
    }
  }

  function getColor(i) {
    const colors = ["#e63946", "#f1fa8c", "#2a9d8f", "#457b9d", "#ffb703", "#6a4c93", "#8ecae6"];
    return colors[i % colors.length];
  }

  function getLabelColor(i) {
    const colors = ["#c0202d", "#8a6f00", "#1e7a6e", "#2e5f80", "#c98a00", "#4e3870", "#5ba3c9"];
    return colors[i % colors.length];
  }

  updateStack(); // initial render

  // Add ruler functionality
  function updateRuler() {
    const ruler = document.getElementById('ruler');
    const width = window.innerWidth;
    ruler.innerHTML = '';
    
    // Add marks every 100px
    for (let i = 0; i <= width; i += 100) {
      const mark = document.createElement('div');
      mark.className = 'ruler-mark';
      mark.style.left = i + 'px';
      mark.textContent = i;
      ruler.appendChild(mark);
    }
  }

  // Update ruler on window resize
  window.addEventListener('resize', updateRuler);
  updateRuler(); // Initial ruler setup
});
</script>

{% endblock %}
